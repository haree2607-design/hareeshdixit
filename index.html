  <style>
        body {
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    font-family: 'Times New Roman', Times, serif;

}

/* Side images */
.side-img {
    border-radius: 15px;
    height: 300px;
    object-fit: cover;
}

/* Center box */
.center-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 0px 10px gray;
}

/* Message */
#message {
    margin-top: 15px;
    font-size: 18px;
    color: blue;
    opacity: 0;
    transition: 1s;
}

.balloons {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    pointer-events: none;
}

.balloon {
    width: 50px;
    height: 70px;
    background-color: red;
    border-radius: 50%;
    position: absolute;
    bottom: -100px;
    animation: floatUp 6s infinite;
}

.balloon:nth-child(2) {
    left: 50%;
    background-color: blue;
    animation-delay: 2s;
}

.balloon:nth-child(3) {
    left: 80%;
    background-color: yellow;
    animation-delay: 4s;
}
.balloon:nth-child(4)
{
    right : 80%;
    background-color: pink;
    animation-delay: 2s;
}
.balloon:nth-child(5)
{
    right : 60%;
    background-color: brown;
    animation-delay: 2s;
}
.balloon:nth-child(6)
{
    right : 40%;
    background-color: pink;
    animation-delay: 2s;
}
.balloon:nth-child(7)
{
    right : 30%;
    background-color: pink;
    animation-delay: 2s;
}
.balloon:nth-child(8)
{
    right : 83%;
    background-color: pink;
    animation-delay: 2s;
}
.balloon:nth-child(9)
{
    right : 20%;
    background-color: pink;
    animation-delay: 2s;
}
.balloon:nth-child(10)
{
    right : 10%;
    background-color: pink;
    animation-delay: 2s;
}

@keyframes floatUp {
    0% {
        transform: translateY(0);
    }
    100% {
        transform: translateY(-800px);
    }
}


.top-section {
    margin-top: 50px;
}

/* Gallery */
.gallery {
    margin-top: 30px;
    display: none;   /* 🔴 Hidden initially */
    background-color: aqua;
}

/* Images */
.gallery img {
    width: 250px;
    height: 180px;
    margin: 10px;
    border-radius: 10px;
    object-fit: cover;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}
  </style>
